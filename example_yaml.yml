dataset: # Can make an array as well, but for now just one dataset
  # alias: "EvaluationDatasetV1" # [or]
  # path: "path to dataset json" [or]
  goldens:
    - input: "What is the capital of France?"
      expected_output: "Paris"
    - input: "What is the capital of Germany?"
      expected_output: "Berlin"

model_callback:
  file_path: "model_callback.py"
  function_name: "model_callback" # Needs to take input and turns, can return a Turn like the simulator model callback

metrics:
  - name: "AnswerRelevancyMetric"
    threshold: 0.5

required_metrics:
  - name: "AnswerRelevancyMetric"

pass_rate: 0.5 # Optional, minimum pass rate for the test run to be considered successful