name: DeepEval CI/CD

on:
  pull_request:
    branches: [ main ]

jobs:
  evaluate:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write 
      contents: read
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      CONFIDENT_API_KEY: ${{ secrets.CONFIDENT_API_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
    steps:
      #----------------------------------------------
      #       check-out repo and set-up python
      #----------------------------------------------
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      #----------------------------------------------
      #  -----  install & configure poetry  -----
      #----------------------------------------------
      - name: Install Poetry & Dependencies
        run: |
          pip install poetry
          poetry install

      #----------------------------------------------
      #              run cicd evaluation
      #----------------------------------------------
      - name: Run DeepEval CICD
        if: ${{ env.OPENAI_API_KEY != '' }}
        run: |
          poetry run deepeval test run example_yaml.yml --cicd

      #----------------------------------------------
      #              fallback logic
      #----------------------------------------------
      - name: Skip without OpenAI API key
        if: ${{ env.OPENAI_API_KEY == '' }}
        run: |
          echo "::notice title=CICD Skipped::Set the OPENAI_API_KEY repository secret to run this job."