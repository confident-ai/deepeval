name: Release

on:
  push:
    branches: [main]
    paths:
      - "pyproject.toml"
      - "typescript/package.json"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing tag to release (e.g. python-v4.0.8 or typescript-v0.1.29)."
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.tag_name || github.ref_name }}

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine tags to release
        id: tags
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          declare -a TAGS=()

          add_tag() {
            local tag="$1"
            if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
              echo "Tag $tag already exists; skipping."
            else
              echo "Creating tag $tag."
              git tag "$tag"
              git push origin "$tag"
              TAGS+=("$tag")
            fi
          }

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag_name }}"
            case "$TAG" in
              python-v*|typescript-v*) TAGS+=("$TAG") ;;
              *) echo "::error::Tag '$TAG' must match python-v* or typescript-v*."; exit 1 ;;
            esac
          else
            PY_VERSION=$(grep -m1 -E '^version = ' pyproject.toml | sed -E 's/^version = "([^"]+)".*/\1/')
            TS_VERSION=$(jq -r .version typescript/package.json)
            add_tag "python-v$PY_VERSION"
            add_tag "typescript-v$TS_VERSION"
          fi

          echo "list=${TAGS[*]:-}" >> "$GITHUB_OUTPUT"

      - name: Create draft releases
        if: steps.tags.outputs.list != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAGS: ${{ steps.tags.outputs.list }}
        run: |
          set -euo pipefail

          # PR numbers whose squash-merge commit touched the given pathspecs.
          pr_by_sdk() {
            local range="$1"; shift
            git log --no-merges --format='%s' $range -- "$@" \
              | sed -nE 's/.*\(#([0-9]+)\).*/\1/p' | sort -u
          }

          for TAG in $TAGS; do
            case "$TAG" in
              python-v*)     SDK="Python";     PREFIX="python-v" ;;
              typescript-v*) SDK="TypeScript"; PREFIX="typescript-v" ;;
            esac

            PREV=$(
              { echo "$TAG"; git tag --list "${PREFIX}*"; } \
                | grep -v '^$' | sort -u -V -r \
                | awk -v cur="$TAG" 'found{print; exit} $0==cur{found=1}'
            )

            API_ARGS=(-f tag_name="$TAG")
            if [ -n "$PREV" ]; then
              API_ARGS+=(-f previous_tag_name="$PREV")
              RANGE="$PREV..$TAG"
            else
              RANGE="$TAG"
            fi
            BODY=$(gh api "repos/$REPO/releases/generate-notes" "${API_ARGS[@]}" --jq .body)

            ALL_PRS=$(printf '%s\n' "$BODY" | grep -oE '/pull/[0-9]+' | grep -oE '[0-9]+' | sort -u || true)
            TS_PRS=$(pr_by_sdk "$RANGE" typescript/)
            PY_PRS=$(pr_by_sdk "$RANGE" deepeval/ pyproject.toml poetry.lock)
            OWNED=$(printf '%s\n%s\n' "$TS_PRS" "$PY_PRS" | grep -v '^$' | sort -u)
            SHARED_PRS=$(comm -23 <(printf '%s\n' "$ALL_PRS") <(printf '%s\n' "$OWNED"))

            case "$SDK" in
              TypeScript) SELECTED=$(printf '%s\n%s\n' "$TS_PRS" "$SHARED_PRS" | grep -v '^$' | sort -u) ;;
              Python)     SELECTED=$(printf '%s\n%s\n' "$PY_PRS" "$SHARED_PRS" | grep -v '^$' | sort -u) ;;
            esac

            # Keep every non-PR line (headers, blanks, Full Changelog); drop PR lines out of scope.
            FILTERED=$(printf '%s\n' "$BODY" | while IFS= read -r line; do
              num=$(printf '%s' "$line" | grep -oE '/pull/[0-9]+' | grep -oE '[0-9]+' | head -1 || true)
              if [ -z "$num" ] || printf '%s\n' "$SELECTED" | grep -qx "$num"; then
                printf '%s\n' "$line"
              fi
            done)

            {
              echo "New to \`deepeval\`? Get started [here](https://deepeval.com/docs/introduction)."
              echo
              echo "$FILTERED"
              echo
              echo "A huge thank you to everyone who contributed to this release ❤️"
            } > notes.md

            gh release create "$TAG" --title "$SDK ${TAG#$PREFIX}" --draft --notes-file notes.md
          done
