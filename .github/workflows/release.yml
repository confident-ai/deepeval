name: Release

on:
  push:
    tags:
      - "python-v*"
      - "typescript-v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing tag to release (e.g. python-v4.0.8 or typescript-v0.1.29)."
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.tag_name || github.ref_name }}

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag and SDK
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag_name }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi

          case "$TAG" in
            python-v*)     SDK="Python";     PREFIX="python-v" ;;
            typescript-v*) SDK="TypeScript"; PREFIX="typescript-v" ;;
            *)
              echo "::error::Tag '$TAG' does not match python-v* or typescript-v*."
              exit 1
              ;;
          esac

          PREV=$(
            { echo "$TAG"; git tag --list "${PREFIX}*"; } \
              | grep -v '^$' | sort -u -V -r \
              | awk -v cur="$TAG" 'found{print; exit} $0==cur{found=1}'
          )

          echo "TAG=$TAG" >> "$GITHUB_OUTPUT"
          echo "TITLE=$SDK ${TAG#$PREFIX}" >> "$GITHUB_OUTPUT"
          echo "PREV=$PREV" >> "$GITHUB_OUTPUT"

          if [ -n "$PREV" ]; then
            echo "Releasing $TAG (notes since $PREV)."
          else
            echo "Releasing $TAG (no previous $SDK tag; full notes)."
          fi

      - name: Create draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ steps.vars.outputs.TAG }}
          TITLE: ${{ steps.vars.outputs.TITLE }}
          PREV: ${{ steps.vars.outputs.PREV }}
        run: |
          API_ARGS=(-f tag_name="$TAG")
          if [ -n "$PREV" ]; then
            API_ARGS+=(-f previous_tag_name="$PREV")
          fi
          BODY=$(gh api "repos/$REPO/releases/generate-notes" "${API_ARGS[@]}" --jq .body)

          {
            echo "New to \`deepeval\`? Get started [here](https://deepeval.com/docs/introduction)."
            echo
            echo "$BODY"
            echo
            echo "A huge thank you to everyone who contributed to this release ❤️"
          } > notes.md

          gh release create "$TAG" --title "$TITLE" --draft --notes-file notes.md
